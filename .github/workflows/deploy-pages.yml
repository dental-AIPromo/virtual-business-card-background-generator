name: Deploy Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout production bundle
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-src

      - name: Checkout preview bundle
        uses: actions/checkout@v5
        with:
          ref: dev
          path: dev-src

      - name: Assemble Pages artifact
        shell: bash
        run: |
          mkdir -p site/dev
          cp -R main-src/docs/. site/
          cp -R dev-src/docs/. site/dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
