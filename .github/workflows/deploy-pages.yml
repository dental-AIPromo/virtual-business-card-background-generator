name: Deploy Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout production source
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-src

      - name: Checkout preview source
        uses: actions/checkout@v5
        with:
          ref: dev
          path: dev-src

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            main-src/package-lock.json
            dev-src/package-lock.json

      - name: Install production dependencies
        working-directory: ./main-src
        run: npm ci

      - name: Build production site
        working-directory: ./main-src
        env:
          VITE_APP_BASE: /virtual-business-card-background-generator/
        run: npm run verify

      - name: Install preview dependencies
        working-directory: ./dev-src
        run: npm ci

      - name: Build preview site
        working-directory: ./dev-src
        env:
          VITE_APP_BASE: /virtual-business-card-background-generator/dev/
        run: npm run verify

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/dev
          cp -R main-src/dist/. site/
          cp -R dev-src/dist/. site/dev/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
